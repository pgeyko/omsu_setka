basePath: /api/v1
definitions:
  api.UnsubscribeRequest:
    properties:
      entity_id:
        type: integer
      entity_type:
        type: string
      fcm_token:
        type: string
    type: object
  models.Auditory:
    properties:
      building:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  models.BFFResponse:
    properties:
      cached_at:
        type: string
      data: {}
      has_next:
        type: boolean
      has_prev:
        type: boolean
      source:
        description: '"cache", "upstream", "stale"'
        type: string
      success:
        type: boolean
      week_end:
        type: string
      week_start:
        type: string
    type: object
  models.Day:
    properties:
      day:
        type: string
      lessons:
        items:
          $ref: '#/definitions/models.Lesson'
        type: array
    type: object
  models.Group:
    properties:
      id:
        type: integer
      name:
        type: string
      real_group_id:
        type: integer
    type: object
  models.Lesson:
    properties:
      auditCorps:
        type: string
      faculty:
        type: string
      group:
        type: string
      id:
        type: integer
      lesson:
        type: string
      publishDate:
        type: string
      subgroupName:
        type: string
      teacher:
        type: string
      time:
        type: integer
      type_work:
        type: string
    type: object
  models.Tutor:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  storage.ScheduleChange:
    properties:
      change_type:
        description: '"added", "removed", "modified"'
        type: string
      created_at:
        type: string
      entity_id:
        type: integer
      entity_type:
        type: string
      id:
        type: integer
      lesson_id:
        type: integer
      new_data:
        type: string
      old_data:
        type: string
    type: object
  storage.Subscription:
    properties:
      before_minutes:
        type: integer
      digest_time:
        type: string
      entity_id:
        type: integer
      entity_type:
        type: string
      fcm_token:
        type: string
      last_reminder_at:
        type: string
      notify_before_lesson:
        type: boolean
      notify_daily_digest:
        type: boolean
      notify_on_change:
        type: boolean
      subgroup:
        type: string
      timezone:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: High-performance BFF for Omsu university schedule.
  title: Omsu Schedule Mirror API
  version: "1.0"
paths:
  /auditories:
    get:
      description: Returns a list of all auditories and buildings.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/models.BFFResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Auditory'
                  type: array
              type: object
      summary: Get all auditories
      tags:
      - Dictionaries
  /auditories/{id}:
    get:
      description: Returns a single auditory by its ID.
      parameters:
      - description: Auditory ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/models.BFFResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Auditory'
              type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get auditory by ID
      tags:
      - Dictionaries
  /changes/{type}/{id}:
    get:
      description: Returns recent schedule changes for a group, tutor, or auditory.
      parameters:
      - description: 'Entity type: group, tutor, auditory'
        in: path
        name: type
        required: true
        type: string
      - description: Entity ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/models.BFFResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/storage.ScheduleChange'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get schedule changes
      tags:
      - Changes
  /groups:
    get:
      description: Returns a list of all study groups.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/models.BFFResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Group'
                  type: array
              type: object
      summary: Get all groups
      tags:
      - Dictionaries
  /groups/{id}:
    get:
      description: Returns a single group by its ID.
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/models.BFFResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Group'
              type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get group by ID
      tags:
      - Dictionaries
  /health:
    get:
      description: Returns service uptime and cache statistics.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.BFFResponse'
      summary: Get health status
      tags:
      - Meta
  /incidents:
    get:
      description: Returns recent health incidents for the upstream service.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.BFFResponse'
      summary: Get recent incidents
      tags:
      - Meta
  /notifications/settings:
    patch:
      consumes:
      - application/json
      description: Updates subscription preferences for a specific entity (group,
        tutor, auditory).
      parameters:
      - description: Notification Settings
        in: body
        name: settings
        required: true
        schema:
          $ref: '#/definitions/storage.Subscription'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update notification settings
      tags:
      - Notifications
  /notifications/settings/{type}/{id}:
    get:
      description: Returns current notification preferences for a specific subscription.
      parameters:
      - description: Entity type (group, tutor, auditory)
        in: path
        name: type
        required: true
        type: string
      - description: Entity ID
        in: path
        name: id
        required: true
        type: integer
      - description: FCM Token
        in: header
        name: X-FCM-Token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/storage.Subscription'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get notification settings
      tags:
      - Notifications
  /schedule/auditory/{id}:
    get:
      description: Returns the schedule for a specific auditory. Lazy-fetches if not
        in cache.
      parameters:
      - description: Auditory ID
        in: path
        name: id
        required: true
        type: integer
      - description: Week start date in YYYY-MM-DD format
        in: query
        name: week_start
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/models.BFFResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Day'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get auditory schedule
      tags:
      - Schedules
  /schedule/auditory/{id}/ical:
    get:
      description: Returns the schedule for an auditory in .ics format. If ICAL_ACCESS_TOKEN
        is configured, pass it as the token query parameter.
      parameters:
      - description: Auditory ID
        in: path
        name: id
        required: true
        type: integer
      - description: Optional iCal access token
        in: query
        name: token
        type: string
      produces:
      - text/calendar
      responses:
        "200":
          description: iCalendar payload
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Export auditory schedule as iCalendar
      tags:
      - Schedules
  /schedule/group/{id}:
    get:
      description: Returns the schedule for a specific group. Lazy-fetches if not
        in cache.
      parameters:
      - description: Group ID (real_group_id)
        in: path
        name: id
        required: true
        type: integer
      - description: Week start date in YYYY-MM-DD format
        in: query
        name: week_start
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/models.BFFResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Day'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get group schedule
      tags:
      - Schedules
  /schedule/group/{id}/ical:
    get:
      description: Returns the schedule for a group in .ics format. If ICAL_ACCESS_TOKEN
        is configured, pass it as the token query parameter.
      parameters:
      - description: Group ID (real_group_id)
        in: path
        name: id
        required: true
        type: integer
      - description: Optional iCal access token
        in: query
        name: token
        type: string
      produces:
      - text/calendar
      responses:
        "200":
          description: iCalendar payload
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Export group schedule as iCalendar
      tags:
      - Schedules
  /schedule/tutor/{id}:
    get:
      description: Returns the schedule for a specific tutor. Lazy-fetches if not
        in cache.
      parameters:
      - description: Tutor ID
        in: path
        name: id
        required: true
        type: integer
      - description: Week start date in YYYY-MM-DD format
        in: query
        name: week_start
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/models.BFFResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Day'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get tutor schedule
      tags:
      - Schedules
  /schedule/tutor/{id}/ical:
    get:
      description: Returns the schedule for a tutor in .ics format. If ICAL_ACCESS_TOKEN
        is configured, pass it as the token query parameter.
      parameters:
      - description: Tutor ID
        in: path
        name: id
        required: true
        type: integer
      - description: Optional iCal access token
        in: query
        name: token
        type: string
      produces:
      - text/calendar
      responses:
        "200":
          description: iCalendar payload
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Export tutor schedule as iCalendar
      tags:
      - Schedules
  /search:
    get:
      description: Prefix search with autocomplete.
      parameters:
      - description: Query string (min 2 chars)
        in: query
        name: q
        required: true
        type: string
      - default: all
        description: 'Filter type: group, tutor, auditory, all'
        in: query
        name: type
        type: string
      - default: 20
        description: Limit results
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.BFFResponse'
      summary: Search groups, tutors, or auditories
      tags:
      - Search
  /subscribe:
    post:
      consumes:
      - application/json
      description: Creates or updates a notification subscription for a group, tutor,
        or auditory.
      parameters:
      - description: Subscription
        in: body
        name: subscription
        required: true
        schema:
          $ref: '#/definitions/storage.Subscription'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
        "429":
          description: Too Many Requests
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Subscribe to schedule notifications
      tags:
      - Notifications
  /sync/status:
    get:
      description: Returns the last synchronization timestamps for dictionaries and
        schedules.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.BFFResponse'
      summary: Get sync status
      tags:
      - Meta
  /sync/trigger:
    post:
      description: Forces a background synchronization of dictionaries and active
        schedules. (Admin only)
      parameters:
      - description: Admin Secret Key
        in: header
        name: X-Admin-Key
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.BFFResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Trigger manual sync
      tags:
      - Meta
  /tutors:
    get:
      description: Returns a list of all teachers.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/models.BFFResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Tutor'
                  type: array
              type: object
      summary: Get all tutors
      tags:
      - Dictionaries
  /tutors/{id}:
    get:
      description: Returns a single teacher by their ID.
      parameters:
      - description: Tutor ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/models.BFFResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Tutor'
              type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get tutor by ID
      tags:
      - Dictionaries
  /unsubscribe:
    post:
      consumes:
      - application/json
      description: Removes a notification subscription for a group, tutor, or auditory.
      parameters:
      - description: Subscription identity
        in: body
        name: subscription
        required: true
        schema:
          $ref: '#/definitions/api.UnsubscribeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Unsubscribe from schedule notifications
      tags:
      - Notifications
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: X-Admin-Key
    type: apiKey
swagger: "2.0"
