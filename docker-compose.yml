version: '3.8'

services:
  backend:
    image: ghcr.io/pgeyko/omsu_setka/backend:latest
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: omsu_mirror_backend
    restart: always
    volumes:
      - ./data:/data
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/pgeyko/omsu_setka/frontend:latest
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: omsu_mirror_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 32M
        reservations:
          memory: 16M

networks:
  default:
    name: omsu_mirror_network
