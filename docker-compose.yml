version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: omsu_mirror_backend
    restart: always
    volumes:
      - ./data:/data
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "/app/omsu_mirror", "-health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: omsu_mirror_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 32M
        reservations:
          memory: 16M

networks:
  default:
    name: omsu_mirror_network
